<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度レシートリーダー (Vision API)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .blur-overlay { backdrop-filter: blur(4px); }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-20">

<div class="max-w-6xl mx-auto p-4 sm:p-6">
    
    <header class="mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                高精度レシートリーダー
            </h1>
            <p class="text-xs text-gray-500 mt-1">Google Cloud Vision API版</p>
        </div>
        <button id="toggleSettingsBtn" class="text-sm bg-white border border-gray-300 px-3 py-1.5 rounded-lg shadow-sm hover:bg-gray-50 flex items-center gap-2 transition-colors">
            <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            API設定
        </button>
    </header>

    <!-- APIキー設定パネル -->
    <div id="settingsPanel" class="hidden mb-6 bg-white p-5 rounded-xl border border-emerald-200 shadow-sm relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">Google Cloud Vision API キーの設定</h3>
        <p class="text-xs text-gray-500 mb-3">APIキーはお使いの端末専用のクラウド領域に安全に保存されます。</p>
        <div class="flex gap-2">
            <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="flex-grow text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none font-mono">
            <button id="saveApiKeyBtn" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-emerald-700 transition-colors shrink-0">保存</button>
        </div>
        <p id="apiKeyStatus" class="text-xs mt-2 text-emerald-600 hidden">✓ APIキーを保存しました</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- 画像選択・プレビュー -->
            <div class="flex flex-col gap-4">
                <label for="imageInput" class="cursor-pointer group flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-emerald-300 rounded-xl bg-emerald-50 hover:bg-emerald-100 transition-colors relative overflow-hidden">
                    <svg class="w-8 h-8 text-emerald-500 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="text-sm font-semibold text-emerald-700">カメラ起動 / 写真を選択</span>
                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                    <div id="imageLoadingOverlay" class="hidden absolute inset-0 bg-white/80 blur-overlay flex items-center justify-center">
                        <div class="loader"></div>
                    </div>
                </label>

                <div id="previewContainer" class="hidden relative w-full h-64 bg-gray-100 rounded-xl overflow-hidden border border-gray-200">
                    <img id="imagePreview" src="" alt="プレビュー" class="w-full h-full object-contain">
                </div>
                
                <button id="startVisionBtn" disabled class="w-full py-3 px-4 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    高精度OCRを実行
                </button>
            </div>

            <!-- 現在の読み取り結果 -->
            <div class="flex flex-col relative">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-bold text-gray-700 text-sm">読み取り結果</h2>
                    <button id="copyBtn" class="hidden text-xs text-emerald-600 hover:bg-emerald-50 px-2 py-1 rounded font-medium transition-colors border border-emerald-200">
                        コピー
                    </button>
                </div>
                <textarea id="resultText" class="w-full h-64 md:h-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none text-gray-800 text-sm leading-relaxed bg-gray-50" placeholder="画像をアップロードし、「OCRを実行」ボタンを押すと、ここに結果が表示されます。" readonly></textarea>
                
                <!-- 処理中オーバーレイ -->
                <div id="processingOverlay" class="hidden absolute inset-0 bg-white/90 blur-overlay flex flex-col items-center justify-center rounded-xl z-10">
                    <div class="loader mb-3"></div>
                    <p class="text-sm font-bold text-emerald-700">AIがテキストを解析中...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-end mb-4 mt-12">
        <div>
            <h2 class="text-xl font-bold text-gray-900">保存された履歴</h2>
            <p class="text-xs text-gray-500">クラウドに自動保存されています。リロードしても消えません。</p>
        </div>
        <button id="exportBtn" class="text-xs bg-gray-800 text-white px-3 py-1.5 rounded-lg hover:bg-gray-700 transition-colors flex items-center gap-1 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            ファイルに書き出し
        </button>
    </div>

    <!-- 履歴リストコンテナ -->
    <div id="historyList" class="flex flex-col gap-4">
        <div class="text-center py-10 text-gray-400 text-sm bg-white rounded-xl border border-dashed border-gray-300">
            まだ履歴がありません。<br>レシートを読み取るとここに保存されます。
        </div>
    </div>

</div>

<!-- トースト通知 -->
<div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white text-sm px-6 py-3 rounded-full shadow-xl translate-y-20 opacity-0 transition-all duration-300 z-50">
    メッセージ
</div>

<!-- グローバル初期化ローダー -->
<div id="authLoader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
    <div class="loader mb-4"></div>
    <p class="text-gray-500 text-sm font-medium">システムを初期化しています...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Firebase初期設定
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'receipt-scanner-app';
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    
    let app, auth, db, currentUserId;
    
    // DOM要素
    const UI = {
        authLoader: document.getElementById('authLoader'),
        toggleSettingsBtn: document.getElementById('toggleSettingsBtn'),
        settingsPanel: document.getElementById('settingsPanel'),
        apiKeyInput: document.getElementById('apiKeyInput'),
        saveApiKeyBtn: document.getElementById('saveApiKeyBtn'),
        apiKeyStatus: document.getElementById('apiKeyStatus'),
        
        imageInput: document.getElementById('imageInput'),
        imageLoadingOverlay: document.getElementById('imageLoadingOverlay'),
        previewContainer: document.getElementById('previewContainer'),
        imagePreview: document.getElementById('imagePreview'),
        startVisionBtn: document.getElementById('startVisionBtn'),
        
        resultText: document.getElementById('resultText'),
        copyBtn: document.getElementById('copyBtn'),
        processingOverlay: document.getElementById('processingOverlay'),
        
        historyList: document.getElementById('historyList'),
        exportBtn: document.getElementById('exportBtn'),
        toast: document.getElementById('toast')
    };

    let cachedApiKey = "";
    let currentImageBase64 = ""; // Data URLを含む
    let historyData = [];

    async function initApp() {
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // 認証 (常にこれを待つ)
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                const userCredential = await signInWithCustomToken(auth, __initial_auth_token);
                currentUserId = userCredential.user.uid;
            } else {
                const userCredential = await signInAnonymously(auth);
                currentUserId = userCredential.user.uid;
            }

            // 設定と履歴の読み込み開始
            await loadSettings();
            listenToHistory();
            
            // UIの初期化完了
            UI.authLoader.classList.add('hidden');
            setupEventListeners();
            
            if (!cachedApiKey) {
                UI.settingsPanel.classList.remove('hidden');
                showToast("Vision APIキーを設定してください", "warning");
            }

        } catch (error) {
            console.error("App Initialization Error:", error);
            UI.authLoader.innerHTML = `<p class="text-red-500">初期化エラー: ${error.message}</p>`;
        }
    }

    async function loadSettings() {
        if (!currentUserId) return;
        const settingsRef = doc(db, 'artifacts', appId, 'users', currentUserId);
        const snap = await getDoc(settingsRef);
        if (snap.exists() && snap.data().apiKey) {
            cachedApiKey = snap.data().apiKey;
            UI.apiKeyInput.value = cachedApiKey;
        }
    }

    async function saveSettings(apiKey) {
        if (!currentUserId) return;
        const settingsRef = doc(db, 'artifacts', appId, 'users', currentUserId);
        await setDoc(settingsRef, { apiKey: apiKey }, { merge: true });
        cachedApiKey = apiKey;
        
        UI.apiKeyStatus.classList.remove('hidden');
        setTimeout(() => UI.apiKeyStatus.classList.add('hidden'), 3000);
    }

    function listenToHistory() {
        if (!currentUserId) return;
        const historyRef = collection(db, 'artifacts', appId, 'users', currentUserId, 'receipts');
        
        onSnapshot(historyRef, (snapshot) => {
            const receipts = [];
            snapshot.forEach(doc => {
                receipts.push({ id: doc.id, ...doc.data() });
            });
            // JS側で日付の降順ソート
            receipts.sort((a, b) => b.createdAt - a.createdAt);
            historyData = receipts;
            renderHistory(receipts);
        }, (error) => {
            console.error("履歴監視エラー:", error);
            showToast("履歴の同期に失敗しました", "error");
        });
    }

    async function saveReceiptToCloud(imageBase64, extractedText) {
        if (!currentUserId) return;
        const historyRef = collection(db, 'artifacts', appId, 'users', currentUserId, 'receipts');
        await addDoc(historyRef, {
            image: imageBase64,
            text: extractedText,
            createdAt: Date.now()
        });
    }

    async function deleteReceipt(docId) {
        if (!currentUserId) return;
        const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'receipts', docId);
        await deleteDoc(docRef);
        showToast("履歴を削除しました");
    }

    // 画像のリサイズと圧縮 (Firestoreの1MB制限対策 & 通信量削減)
    function processImageFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_DIMENSION = 1000;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
                        if (width > height) {
                            height = Math.round(height * (MAX_DIMENSION / width));
                            width = MAX_DIMENSION;
                        } else {
                            width = Math.round(width * (MAX_DIMENSION / height));
                            height = MAX_DIMENSION;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // JPEGとして品質0.8で圧縮 (DataURL形式)
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    resolve(dataUrl);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    async function callVisionApi(base64DataUrl) {
        if (!cachedApiKey) throw new Error("APIキーが設定されていません。");
        
        // Data URLからBase64データ本体のみを抽出
        const base64Data = base64DataUrl.split(',')[1];
        
        const url = `https://vision.googleapis.com/v1/images:annotate?key=${cachedApiKey}`;
        const payload = {
            requests: [{
                image: { content: base64Data },
                // DOCUMENT_TEXT_DETECTION はレシートなどの密集した文字に最適
                features: [{ type: "DOCUMENT_TEXT_DETECTION" }]
            }]
        };

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();
        
        if (!response.ok || data.error) {
            throw new Error(data.error?.message || "Vision API リクエストエラー");
        }

        const responses = data.responses[0];
        if (!responses || !responses.fullTextAnnotation) {
            return "文字が検出されませんでした。";
        }
        
        return responses.fullTextAnnotation.text;
    }

    function setupEventListeners() {
        // 設定パネルのトグル
        UI.toggleSettingsBtn.addEventListener('click', () => {
            UI.settingsPanel.classList.toggle('hidden');
        });

        // APIキー保存
        UI.saveApiKeyBtn.addEventListener('click', async () => {
            const key = UI.apiKeyInput.value.trim();
            if (!key) {
                showToast("APIキーを入力してください", "error");
                return;
            }
            UI.saveApiKeyBtn.disabled = true;
            UI.saveApiKeyBtn.textContent = "保存中...";
            try {
                await saveSettings(key);
                showToast("APIキーを保存しました");
            } catch(e) {
                showToast("保存に失敗しました", "error");
            } finally {
                UI.saveApiKeyBtn.disabled = false;
                UI.saveApiKeyBtn.textContent = "保存";
            }
        });

        // 画像選択時
        UI.imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            UI.imageLoadingOverlay.classList.remove('hidden');
            UI.startVisionBtn.disabled = true;

            try {
                // 画像をリサイズ＆圧縮
                currentImageBase64 = await processImageFile(file);
                
                // プレビュー表示
                UI.imagePreview.src = currentImageBase64;
                UI.previewContainer.classList.remove('hidden');
                
                // ボタン有効化
                UI.startVisionBtn.disabled = false;
                UI.resultText.value = "";
                UI.copyBtn.classList.add('hidden');
            } catch(error) {
                console.error(error);
                showToast("画像の読み込みに失敗しました", "error");
            } finally {
                UI.imageLoadingOverlay.classList.add('hidden');
            }
        });

        // OCR実行ボタン
        UI.startVisionBtn.addEventListener('click', async () => {
            if (!currentImageBase64) return;
            if (!cachedApiKey) {
                showToast("先にAPIキーを設定してください", "error");
                UI.settingsPanel.classList.remove('hidden');
                return;
            }

            UI.processingOverlay.classList.remove('hidden');
            UI.startVisionBtn.disabled = true;

            try {
                const extractedText = await callVisionApi(currentImageBase64);
                UI.resultText.value = extractedText;
                UI.copyBtn.classList.remove('hidden');
                
                // 履歴に自動保存
                await saveReceiptToCloud(currentImageBase64, extractedText);
                showToast("読み取り完了・履歴に保存しました");
                
            } catch (error) {
                console.error(error);
                UI.resultText.value = `エラーが発生しました:\n${error.message}\n\nAPIキーが正しいか、または利用制限に達していないか確認してください。`;
                showToast("読み取りエラー", "error");
            } finally {
                UI.processingOverlay.classList.add('hidden');
                UI.startVisionBtn.disabled = false;
            }
        });

        // コピーボタン
        UI.copyBtn.addEventListener('click', () => {
            if (!UI.resultText.value) return;
            UI.resultText.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            showToast("クリップボードにコピーしました");
        });

        // エクスポートボタン (ファイル書き出し)
        UI.exportBtn.addEventListener('click', () => {
            if (historyData.length === 0) {
                showToast("エクスポートする履歴がありません", "warning");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(historyData, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `receipt_history_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            document.body.removeChild(dlAnchorElem);
            showToast("履歴ファイル(.json)をダウンロードしました");
        });
    }

    function renderHistory(receipts) {
        if (receipts.length === 0) {
            UI.historyList.innerHTML = `
                <div class="text-center py-10 text-gray-400 text-sm bg-white rounded-xl border border-dashed border-gray-300">
                    まだ履歴がありません。<br>レシートを読み取るとここに保存されます。
                </div>`;
            return;
        }

        UI.historyList.innerHTML = '';
        receipts.forEach(item => {
            const dateStr = new Date(item.createdAt).toLocaleString('ja-JP', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });

            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col md:flex-row gap-4 relative group";
            
            card.innerHTML = `
                <!-- 削除ボタン (ホバー時に表示) -->
                <button class="delete-btn absolute top-2 right-2 bg-red-100 text-red-600 p-1.5 rounded-lg opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity hover:bg-red-200 z-10" data-id="${item.id}" title="履歴を削除">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
                
                <!-- 左側：写真 -->
                <div class="w-full md:w-1/3 lg:w-1/4 flex-shrink-0 relative h-48 md:h-auto min-h-[12rem] bg-gray-50 rounded-lg overflow-hidden border border-gray-100">
                    <img src="${item.image}" alt="レシート写真" class="absolute inset-0 w-full h-full object-contain">
                    <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-[10px] px-2 py-1">
                        ${dateStr}
                    </div>
                </div>
                
                <!-- 右側：OCRテキスト -->
                <div class="w-full md:w-2/3 lg:w-3/4 flex-grow flex flex-col">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-gray-500">抽出テキスト</span>
                        <button class="copy-history-btn text-xs text-blue-600 hover:underline px-2" data-text="${encodeURIComponent(item.text)}">コピー</button>
                    </div>
                    <textarea class="w-full h-40 md:h-full p-3 bg-gray-50 border border-gray-100 rounded-lg text-sm text-gray-700 resize-none focus:outline-none focus:ring-1 focus:ring-gray-300" readonly>${item.text}</textarea>
                </div>
            `;
            UI.historyList.appendChild(card);
        });

        // 履歴内のイベントリスナー設定
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.currentTarget.getAttribute('data-id');
                // ブラウザ標準のconfirmは使わず、即時削除または独自UIが好ましいが、ここでは簡易的に即削除(Toast通知付き)
                deleteReceipt(id);
            });
        });

        document.querySelectorAll('.copy-history-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const text = decodeURIComponent(e.currentTarget.getAttribute('data-text'));
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = text;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand("copy");
                document.body.removeChild(tempTextArea);
                showToast("クリップボードにコピーしました");
            });
        });
    }

    // 共通ヘルパー: トースト表示
    function showToast(message, type = "success") {
        UI.toast.textContent = message;
        if (type === "error") {
            UI.toast.className = "fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-red-600 text-white text-sm px-6 py-3 rounded-full shadow-xl z-50 transition-all duration-300";
        } else if (type === "warning") {
            UI.toast.className = "fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-yellow-600 text-white text-sm px-6 py-3 rounded-full shadow-xl z-50 transition-all duration-300";
        } else {
            UI.toast.className = "fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white text-sm px-6 py-3 rounded-full shadow-xl z-50 transition-all duration-300";
        }
        
        UI.toast.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => {
            UI.toast.classList.add('translate-y-20', 'opacity-0');
        }, 3000);
    }

    // アプリ起動
    initApp();
</script>
</body>
</html>
