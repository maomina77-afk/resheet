<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レシートリーダー v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .history-img { object-fit: contain; width: 100%; max-height: 200px; background-color: #f3f4f6; }
        .prevent-os-menu { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">🧾 レシートリーダーv2</h1>
        <button id="nav-settings-btn" class="p-2 rounded hover:bg-blue-700">⚙️ 設定</button>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div id="error-msg" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4 rounded shadow-sm"></div>

        <section id="setup-area" class="hidden bg-white p-6 rounded-xl shadow-md mb-6">
            <h2 class="text-lg font-bold mb-2">Google Vision API 設定</h2>
            <input type="text" id="api-key-input" placeholder="AIzaSy..." class="w-full border border-gray-300 p-3 rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="save-key-btn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-blue-700 transition">APIキーを保存する</button>
            
            <hr class="my-6 border-gray-200">
            
            <h2 class="text-lg font-bold mb-2">データのバックアップ・復元</h2>
            <div class="space-y-3">
                <button id="backup-btn" class="w-full bg-blue-50 text-blue-700 border border-blue-200 font-bold py-3 px-4 rounded-lg shadow-sm hover:bg-blue-100 transition flex justify-center items-center gap-2">
                    <span>📥</span> データのみバックアップ (JSON)
                </button>
                <input type="file" id="restore-input" accept=".json" class="hidden">
                <button id="restore-btn" class="w-full bg-green-50 text-green-700 border border-green-200 font-bold py-3 px-4 rounded-lg shadow-sm hover:bg-green-100 transition flex justify-center items-center gap-2">
                    <span>📤</span> バックアップを復元 (JSON)
                </button>
                <button id="zip-btn" class="w-full bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-indigo-600 transition flex justify-center items-center gap-2 mt-2">
                    <span>📦</span> 画像・テキストをZIPで保存
                </button>
            </div>
            <button id="cancel-settings-btn" class="hidden w-full mt-6 bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg shadow hover:bg-gray-300 transition">設定画面を閉じる</button>
        </section>

        <section id="main-area" class="hidden">
            <input type="file" id="image-input" accept="image/*" class="hidden">

            <div class="grid grid-cols-2 gap-4 mb-3">
                <button id="camera-btn" class="bg-indigo-500 text-white font-bold py-4 px-2 rounded-xl shadow hover:bg-indigo-600 flex flex-col items-center justify-center">
                    <span class="text-2xl mb-1">📷</span><span>カメラで撮影</span>
                </button>
                <button id="file-btn" class="bg-teal-500 text-white font-bold py-4 px-2 rounded-xl shadow hover:bg-teal-600 flex flex-col items-center justify-center">
                    <span class="text-2xl mb-1">🖼️</span><span>画像を選ぶ</span>
                </button>
            </div>

            <div id="group-filters" class="flex gap-1 justify-between mb-6 bg-white p-2 rounded-xl shadow-sm border border-gray-200">
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-blue-600 text-white transition" data-group="all">全体</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="1">1</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="2">2</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="3">3</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="4">4</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="5">5</button>
            </div>

            <div id="preview-area" class="hidden bg-white p-4 rounded-xl shadow-md mb-6 text-center">
                <img id="preview-img" src="" alt="プレビュー" class="max-h-64 mx-auto rounded border border-gray-200 mb-4">
                <button id="scan-btn" class="w-full bg-green-500 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-green-600 text-lg">
                    ✨ このレシートを読み取る
                </button>
            </div>

            <div id="result-area" class="hidden bg-white rounded-xl shadow-md overflow-hidden mb-6 border border-green-200">
                <div class="bg-green-500 text-white px-4 py-2 font-bold flex justify-between items-center">
                    <span>読み取り完了</span>
                    <button id="copy-btn" class="bg-white text-green-600 text-xs px-2 py-1 rounded shadow">コピー</button>
                </div>
                <div class="p-4">
                    <textarea id="result-text" class="w-full h-40 border-none resize-none focus:ring-0 text-gray-700" readonly></textarea>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 border-b pb-2 gap-2">
                <h2 class="text-xl font-bold text-gray-700 whitespace-nowrap">過去の履歴</h2>
                <div class="relative w-full max-w-[200px]">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-500">🔍</span>
                    <input type="text" id="search-input" placeholder="テキスト検索..." class="w-full border border-gray-300 pl-7 pr-2 py-1.5 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div id="history-list" class="space-y-4"></div>
        </section>

        <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-white font-bold text-lg">処理中...</p>
        </div>
    </main>

    <div id="crop-modal" class="hidden fixed inset-0 bg-black bg-opacity-95 z-50 flex flex-col p-4 touch-none">
        <div class="bg-white rounded-xl overflow-hidden flex flex-col h-full max-h-[85vh] w-full max-w-lg mx-auto shadow-2xl">
            <div class="p-3 bg-gray-100 border-b flex justify-between items-center">
                <h3 class="font-bold text-gray-700">画像のトリミング</h3>
                <button id="cancel-crop-btn" class="text-gray-500 text-3xl font-bold leading-none">&times;</button>
            </div>
            <div class="flex-grow bg-black relative">
                <img id="crop-image" src="" alt="Crop" class="max-w-full block">
            </div>
            <div class="p-4 bg-gray-100 border-t flex justify-end">
                <button id="apply-crop-btn" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 shadow w-full">切り抜いて決定</button>
            </div>
        </div>
    </div>

    <div id="image-modal" class="hidden fixed inset-0 bg-black bg-opacity-95 z-50 flex items-center justify-center touch-none">
        <button id="close-image-modal" class="absolute top-4 right-4 text-white text-4xl font-bold z-50 p-2 leading-none">&times;</button>
        <img id="modal-image" src="" alt="拡大画像" class="max-w-full max-h-full origin-center object-contain">
        <p class="absolute bottom-6 text-white text-sm opacity-75 pointer-events-none bg-black bg-opacity-50 px-3 py-1 rounded-full">ピンチで拡大 / 1本指で移動</p>
    </div>

    <div id="text-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-lg p-4 flex flex-col h-[70vh] shadow-2xl relative">
            <div class="flex justify-between items-center mb-1">
                <h3 class="font-bold text-gray-700">テキストの確認・編集</h3>
                <button id="close-text-modal" class="text-gray-500 text-3xl font-bold p-1 leading-none hover:text-gray-800">&times;</button>
            </div>
            <p class="text-[11px] text-gray-500 mb-2 border-b pb-2">エリア内を2本指でピンチして文字サイズを変更できます</p>
            <textarea id="modal-textarea" class="w-full flex-grow border border-gray-300 rounded p-3 text-base resize-none focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 font-mono"></textarea>
            <div class="mt-4 flex justify-end gap-3">
                <button id="cancel-text-btn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold hover:bg-gray-300 transition">キャンセル</button>
                <button id="save-text-btn" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 shadow transition">保存して閉じる</button>
            </div>
        </div>
    </div>

    <script>
        let apiKey = '';
        let currentImageBase64 = '';
        let historyData = [];
        let cropper = null;
        let currentGroupFilter = 'all';

        const setupArea = document.getElementById('setup-area'), mainArea = document.getElementById('main-area'), errorMsg = document.getElementById('error-msg'), loadingOverlay = document.getElementById('loading-overlay'), loadingText = document.getElementById('loading-text');
        const apiKeyInput = document.getElementById('api-key-input'), saveKeyBtn = document.getElementById('save-key-btn'), backupBtn = document.getElementById('backup-btn'), restoreBtn = document.getElementById('restore-btn'), restoreInput = document.getElementById('restore-input'), zipBtn = document.getElementById('zip-btn'), cancelSettingsBtn = document.getElementById('cancel-settings-btn'), navSettingsBtn = document.getElementById('nav-settings-btn');
        const imageInput = document.getElementById('image-input'), cameraBtn = document.getElementById('camera-btn'), fileBtn = document.getElementById('file-btn'), previewArea = document.getElementById('preview-area'), previewImg = document.getElementById('preview-img'), scanBtn = document.getElementById('scan-btn'), resultArea = document.getElementById('result-area'), resultText = document.getElementById('result-text'), historyList = document.getElementById('history-list'), searchInput = document.getElementById('search-input');
        const cropModal = document.getElementById('crop-modal'), cropImage = document.getElementById('crop-image'), applyCropBtn = document.getElementById('apply-crop-btn'), cancelCropBtn = document.getElementById('cancel-crop-btn');
        const imageModal = document.getElementById('image-modal'), modalImage = document.getElementById('modal-image'), closeImageModalBtn = document.getElementById('close-image-modal');
        const textModal = document.getElementById('text-modal'), modalTextarea = document.getElementById('modal-textarea'), closeTextModalBtn = document.getElementById('close-text-modal'), cancelTextBtn = document.getElementById('cancel-text-btn'), saveTextBtn = document.getElementById('save-text-btn');

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                localforage.config({ name: 'ReceiptScannerApp', storeName: 'scanner_data' });
                apiKey = await localforage.getItem('visionApiKey');
                if (apiKey) { apiKeyInput.placeholder = '【＊＊＊＊＊＊】変更する場合のみ入力'; showMainArea(); } else { showSetupArea(); }
                const savedHistory = await localforage.getItem('receiptHistory');
                if (savedHistory && Array.isArray(savedHistory)) { historyData = savedHistory; renderHistory(); }
            } catch (err) { showError("データの読み込みに失敗しました。"); }
        });

        function showSetupArea() { setupArea.classList.remove('hidden'); mainArea.classList.add('hidden'); if(apiKey) cancelSettingsBtn.classList.remove('hidden'); else cancelSettingsBtn.classList.add('hidden'); }
        function showMainArea() { setupArea.classList.add('hidden'); mainArea.classList.remove('hidden'); errorMsg.classList.add('hidden'); }
        function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.remove('hidden'); setTimeout(() => errorMsg.classList.add('hidden'), 5000); }
        function showLoading(text) { loadingText.textContent = text; loadingOverlay.classList.remove('hidden'); }
        function hideLoading() { loadingOverlay.classList.add('hidden'); }

        navSettingsBtn.addEventListener('click', () => { apiKeyInput.value = ''; showSetupArea(); });
        cancelSettingsBtn.addEventListener('click', () => { apiKeyInput.value = ''; showMainArea(); });
        
        saveKeyBtn.addEventListener('click', async () => {
            const val = apiKeyInput.value.trim();
            if (!val && apiKey) return showMainArea();
            if (!val) return showError("APIキーを入力してください。");
            try { await localforage.setItem('visionApiKey', val); apiKey = val; apiKeyInput.placeholder = '【＊＊＊＊＊＊】変更する場合のみ入力'; apiKeyInput.value = ''; showMainArea(); } 
            catch (err) { showError("APIキーの保存に失敗しました。"); }
        });

        // フィルターボタンイベント
        document.querySelectorAll('.group-filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.group-filter-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-gray-100', 'text-gray-600');
                });
                e.target.classList.add('bg-blue-600', 'text-white');
                e.target.classList.remove('bg-gray-100', 'text-gray-600');
                currentGroupFilter = e.target.dataset.group;
                renderHistory();
            });
        });

        restoreBtn.addEventListener('click', () => { restoreInput.click(); });
        restoreInput.addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            try {
                const text = await file.text(); const parsedData = JSON.parse(text);
                if (Array.isArray(parsedData)) {
                    const existingIds = new Set(historyData.map(item => item.id));
                    const newItems = parsedData.filter(item => item.id && !existingIds.has(item.id));
                    historyData = [...newItems, ...historyData];
                    if (historyData.length > 50) historyData = historyData.slice(0, 50);
                    await localforage.setItem('receiptHistory', historyData); renderHistory();
                    const originalHTML = restoreBtn.innerHTML; restoreBtn.innerHTML = '<span>✅</span> 復元完了！'; setTimeout(() => restoreBtn.innerHTML = originalHTML, 2000);
                } else { showError("無効なバックアップファイルです。"); }
            } catch (err) { showError("ファイルの読み込みに失敗しました。"); } finally { restoreInput.value = ''; }
        });

        backupBtn.addEventListener('click', async () => {
            try {
                if (!historyData || historyData.length === 0) { showError("バックアップする履歴データがありません。"); return; }
                const blob = new Blob([JSON.stringify(historyData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
                a.download = `receipt_backup_${new Date().toISOString().slice(0,10)}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                const originalHTML = backupBtn.innerHTML; backupBtn.innerHTML = '<span>✅</span> ダウンロード完了！'; setTimeout(() => backupBtn.innerHTML = originalHTML, 2000);
            } catch (err) { showError("バックアップの作成に失敗しました。"); }
        });

        zipBtn.addEventListener('click', async () => {
            if (!historyData || historyData.length === 0) { showError("保存する履歴データがありません。"); return; }
            showLoading("ZIPファイルを作成中...");
            try {
                const zip = new JSZip();
                historyData.forEach((item, index) => {
                    const folder = zip.folder(`receipt_${item.date.replace(/[\/\s:]/g, '-')}_${index + 1}`);
                    folder.file("image.jpg", item.image.split(',')[1], {base64: true});
                    folder.file("text.txt", item.text || "");
                });
                const blob = await zip.generateAsync({ type: "blob" }); const url = URL.createObjectURL(blob); const a = document.createElement('a');
                a.href = url; a.download = `receipt_export_${new Date().toISOString().slice(0,10)}.zip`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                const originalHTML = zipBtn.innerHTML; zipBtn.innerHTML = '<span>✅</span> ZIP作成完了！'; setTimeout(() => zipBtn.innerHTML = originalHTML, 2000);
            } catch (err) { showError("ZIPファイルの作成に失敗しました。"); } finally { hideLoading(); }
        });

        cameraBtn.addEventListener('click', () => { imageInput.setAttribute('capture', 'environment'); imageInput.click(); });
        fileBtn.addEventListener('click', () => { imageInput.removeAttribute('capture'); imageInput.click(); });

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            showLoading('画像を処理中...'); resultArea.classList.add('hidden'); previewArea.classList.add('hidden');
            try { const base64 = await compressImage(file, 1500); openCropModal(base64); imageInput.value = ''; } 
            catch (err) { showError("画像の処理に失敗しました。"); } finally { hideLoading(); }
        });

        function compressImage(file, maxSize) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
                        else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                        const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height); resolve(canvas.toDataURL('image/jpeg', 0.8));
                    }; img.onerror = reject; img.src = event.target.result;
                }; reader.onerror = reject; reader.readAsDataURL(file);
            });
        }

        function openCropModal(base64Image) {
            cropImage.src = base64Image; cropModal.classList.remove('hidden'); if (cropper) cropper.destroy();
            setTimeout(() => { cropper = new Cropper(cropImage, { viewMode: 1, autoCropArea: 0.9, background: false, dragMode: 'move', guides: true }); }, 50);
        }

        applyCropBtn.addEventListener('click', () => {
            if (!cropper) return; showLoading('トリミング中...');
            setTimeout(() => {
                const canvas = cropper.getCroppedCanvas({ maxWidth: 1200, maxHeight: 1200 }); currentImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                cropModal.classList.add('hidden'); cropper.destroy(); cropper = null; previewImg.src = currentImageBase64; previewArea.classList.remove('hidden'); hideLoading();
            }, 10);
        });

        cancelCropBtn.addEventListener('click', () => { cropModal.classList.add('hidden'); if (cropper) { cropper.destroy(); cropper = null; } currentImageBase64 = ''; });

        scanBtn.addEventListener('click', async () => {
            if (!currentImageBase64) return;
            if (!apiKey) { showError("APIキーが設定されていません。"); showSetupArea(); return; }
            showLoading('クラウドで文字を解析中...');
            try {
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requests: [{ image: { content: currentImageBase64.split(',')[1] }, features: [{ type: 'DOCUMENT_TEXT_DETECTION' }], imageContext: { languageHints: ['ja', 'en'] } }] })
                });
                const data = await response.json(); if (!response.ok) throw new Error(data.error?.message || "API通信エラーが発生しました");
                const text = data.responses[0]?.fullTextAnnotation?.text || "文字が検出されませんでした。";
                resultText.value = text; resultArea.classList.remove('hidden'); previewArea.classList.add('hidden');
                await saveToHistory(currentImageBase64, text);
            } catch (err) { showError("読み取り失敗: " + err.message); if (err.message?.includes('API_KEY_INVALID')) showSetupArea(); } finally { hideLoading(); }
        });

        async function saveToHistory(imgBase64, text) {
            const newItem = { id: Date.now().toString(), date: new Date().toLocaleString('ja-JP'), image: imgBase64, text: text, group: currentGroupFilter === 'all' ? '1' : currentGroupFilter };
            historyData.unshift(newItem); if (historyData.length > 50) historyData = historyData.slice(0, 50);
            try { await localforage.setItem('receiptHistory', historyData); renderHistory(); } catch (err) { console.error("履歴保存失敗", err); }
        }

        searchInput.addEventListener('input', renderHistory);

        window.changeGroup = async function(id, newGroup) {
            const index = historyData.findIndex(item => item.id === id);
            if(index !== -1) {
                historyData[index].group = newGroup;
                await localforage.setItem('receiptHistory', historyData);
                renderHistory();
            }
        };

        function renderHistory() {
            historyList.innerHTML = '';
            const searchTerm = searchInput.value.toLowerCase();
            
            // 絞り込み (検索 & グループ)
            const filteredData = historyData.filter(item => {
                const group = item.group || '1';
                const matchGroup = (currentGroupFilter === 'all' || group === currentGroupFilter);
                const itemText = item.text || "";
                const matchKeyword = !searchTerm || itemText.toLowerCase().includes(searchTerm);
                return matchGroup && matchKeyword;
            });

            if (filteredData.length === 0) { historyList.innerHTML = '<p class="text-gray-500 text-center py-6">該当する履歴がありません。</p>'; return; }

            filteredData.forEach(item => {
                const group = item.group || "1";
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4";
                card.innerHTML = `
                    <div class="bg-gray-50 px-4 py-2 text-xs text-gray-500 border-b flex justify-between items-center">
                        <span>🕒 ${item.date}</span>
                        <div class="flex items-center gap-1">
                            <select onchange="changeGroup('${item.id}', this.value)" ontouchstart="event.stopPropagation()" onmousedown="event.stopPropagation()" class="text-xs border rounded p-1 bg-white text-gray-700 font-bold outline-none cursor-pointer">
                                <option value="1" ${group === '1' ? 'selected' : ''}>G1</option>
                                <option value="2" ${group === '2' ? 'selected' : ''}>G2</option>
                                <option value="3" ${group === '3' ? 'selected' : ''}>G3</option>
                                <option value="4" ${group === '4' ? 'selected' : ''}>G4</option>
                                <option value="5" ${group === '5' ? 'selected' : ''}>G5</option>
                            </select>
                            <button onclick="deleteHistory('${item.id}')" class="text-red-500 hover:text-red-700 font-bold ml-1 border bg-white px-2 py-1 rounded shadow-sm">削除</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-5 h-48">
                        <div class="prevent-os-menu col-span-2 border-r bg-gray-100 flex items-center justify-center p-2 overflow-hidden cursor-pointer active:bg-gray-200 transition relative" id="img-container-${item.id}">
                            <img src="${item.image}" alt="receipt" class="history-img rounded pointer-events-none">
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 bg-black bg-opacity-10 transition pointer-events-none">
                                <span class="text-white text-3xl drop-shadow-md">🔍</span>
                            </div>
                        </div>
                        <div class="prevent-os-menu col-span-3 p-3 overflow-y-auto cursor-pointer active:bg-gray-50 transition relative" id="text-container-${item.id}">
                            <p class="whitespace-pre-wrap text-sm text-gray-700 font-mono pointer-events-none">${escapeHtml(item.text || "")}</p>
                        </div>
                    </div>
                    <div class="bg-gray-100 text-[11px] text-gray-500 text-center py-1 border-t tracking-wider">
                        長押しで拡大・編集できます
                    </div>
                `;
                historyList.appendChild(card);
                addLongPressListener(document.getElementById(`img-container-${item.id}`), () => openImageModal(item.image));
                addLongPressListener(document.getElementById(`text-container-${item.id}`), () => openTextModal(item.id, item.text || ""));
            });
        }

        window.deleteHistory = async function(id) {
            if(confirm("この履歴を削除してもよろしいですか？")) {
                historyData = historyData.filter(item => item.id !== id);
                await localforage.setItem('receiptHistory', historyData); renderHistory();
            }
        };

        function addLongPressListener(element, callback) {
            let pressTimer; let startX, startY;
            const start = (e) => {
                if (e.type === 'mousedown' && e.button !== 0) return;
                if (e.type === 'touchstart') { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }
                pressTimer = setTimeout(() => { callback(e); }, 200); 
            };
            const move = (e) => {
                if (e.type === 'touchmove') {
                    const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
                    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) clearTimeout(pressTimer);
                }
            };
            const cancel = () => clearTimeout(pressTimer);
            element.addEventListener('mousedown', start); element.addEventListener('touchstart', start, { passive: true });
            element.addEventListener('mousemove', cancel); element.addEventListener('touchmove', move, { passive: true });
            element.addEventListener('mouseup', cancel); element.addEventListener('mouseleave', cancel);
            element.addEventListener('touchend', cancel); element.addEventListener('touchcancel', cancel);
            element.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        function getDistance(touches) { const dx = touches[0].clientX - touches[1].clientX, dy = touches[0].clientY - touches[1].clientY; return Math.sqrt(dx * dx + dy * dy); }

        // --- 画像拡大表示 (ピンチ ＆ ドラッグ移動対応) ---
        let imgCurrentScale = 1, imgStartScale = 1, initialDistance = 0;
        let imgCurrentX = 0, imgCurrentY = 0, lastTouchX = 0, lastTouchY = 0, isDragging = false;

        function openImageModal(imgSrc) {
            modalImage.src = imgSrc; imgCurrentScale = 1; imgCurrentX = 0; imgCurrentY = 0;
            updateModalTransform(); imageModal.classList.remove('hidden');
        }
        closeImageModalBtn.addEventListener('click', () => imageModal.classList.add('hidden'));

        function updateModalTransform() { modalImage.style.transform = `translate(${imgCurrentX}px, ${imgCurrentY}px) scale(${imgCurrentScale})`; }

        modalImage.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) { 
                initialDistance = getDistance(e.touches); imgStartScale = imgCurrentScale; isDragging = false;
            } else if (e.touches.length === 1 && imgCurrentScale > 1) {
                isDragging = true; lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
            }
        }, { passive: false });
        
        modalImage.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault(); 
                imgCurrentScale = Math.min(Math.max(1, imgStartScale * (getDistance(e.touches) / initialDistance)), 5);
                if(imgCurrentScale <= 1) { imgCurrentX = 0; imgCurrentY = 0; }
                updateModalTransform();
            } else if (e.touches.length === 1 && isDragging && imgCurrentScale > 1) {
                e.preventDefault();
                imgCurrentX += e.touches[0].clientX - lastTouchX; imgCurrentY += e.touches[0].clientY - lastTouchY;
                lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
                updateModalTransform();
            }
        }, { passive: false });

        modalImage.addEventListener('touchend', () => { 
            isDragging = false; 
            if (imgCurrentScale <= 1) { imgCurrentX = 0; imgCurrentY = 0; updateModalTransform(); }
        });

        // --- テキスト編集 ---
        let editingHistoryId = null, textCurrentScale = 1, textStartScale = 1, textInitialDistance = 0;
        const baseFontSize = 16; 
        function openTextModal(id, text) {
            editingHistoryId = id; modalTextarea.value = text; textCurrentScale = 1;
            modalTextarea.style.fontSize = `${baseFontSize}px`; modalTextarea.style.lineHeight = '1.5'; 
            textModal.classList.remove('hidden');
        }
        function closeTextModal() { textModal.classList.add('hidden'); editingHistoryId = null; }
        closeTextModalBtn.addEventListener('click', closeTextModal); cancelTextBtn.addEventListener('click', closeTextModal);
        saveTextBtn.addEventListener('click', async () => {
            if (editingHistoryId) {
                const itemIndex = historyData.findIndex(item => item.id === editingHistoryId);
                if (itemIndex !== -1) { historyData[itemIndex].text = modalTextarea.value; await localforage.setItem('receiptHistory', historyData); renderHistory(); }
            }
            closeTextModal();
        });
        modalTextarea.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) { textInitialDistance = getDistance(e.touches); textStartScale = textCurrentScale; }
        }, { passive: false });
        modalTextarea.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault(); textCurrentScale = Math.min(Math.max(0.8, textStartScale * (getDistance(e.touches) / textInitialDistance)), 3.5);
                modalTextarea.style.fontSize = `${baseFontSize * textCurrentScale}px`;
            }
        }, { passive: false });

        document.getElementById('copy-btn').addEventListener('click', () => {
            resultText.select(); document.execCommand('copy');
            const btn = document.getElementById('copy-btn'); const originalText = btn.textContent; btn.textContent = 'コピー完了！';
            setTimeout(() => btn.textContent = originalText, 2000);
        });
        function escapeHtml(unsafe) { return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    </script>
</body>
</html>
