<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高精度レシートリーダー (Android版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 履歴画像のサムネイル */
        .history-img { object-fit: contain; width: 100%; max-height: 200px; background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">🧾 レシートリーダー</h1>
        <button id="nav-settings-btn" class="p-2 rounded hover:bg-blue-700">⚙️ 設定</button>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div id="error-msg" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4 rounded shadow-sm"></div>

        <section id="setup-area" class="hidden bg-white p-6 rounded-xl shadow-md mb-6">
            <h2 class="text-lg font-bold mb-2">Google Vision API 設定</h2>
            <p class="text-sm text-gray-600 mb-4">
                文字を高精度で読み取るためにAPIキーが必要です。設定したキーはスマホ内にのみ保存されます。
            </p>
            <input type="text" id="api-key-input" placeholder="AIzaSy..." class="w-full border border-gray-300 p-3 rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="save-key-btn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-blue-700 active:bg-blue-800 transition">
                APIキーを保存する
            </button>
            <button id="cancel-settings-btn" class="hidden w-full mt-3 bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg shadow hover:bg-gray-300 active:bg-gray-400 transition">
                キャンセル
            </button>
        </section>

        <section id="main-area" class="hidden">
            <input type="file" id="image-input" accept="image/*" class="hidden">

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button id="camera-btn" class="bg-indigo-500 text-white font-bold py-4 px-2 rounded-xl shadow hover:bg-indigo-600 active:bg-indigo-700 flex flex-col items-center justify-center">
                    <span class="text-2xl mb-1">📷</span>
                    <span>カメラで撮影</span>
                </button>
                <button id="file-btn" class="bg-teal-500 text-white font-bold py-4 px-2 rounded-xl shadow hover:bg-teal-600 active:bg-teal-700 flex flex-col items-center justify-center">
                    <span class="text-2xl mb-1">🖼️</span>
                    <span>画像を選ぶ</span>
                </button>
            </div>

            <div id="preview-area" class="hidden bg-white p-4 rounded-xl shadow-md mb-6 text-center">
                <img id="preview-img" src="" alt="プレビュー" class="max-h-64 mx-auto rounded border border-gray-200 mb-4">
                <button id="scan-btn" class="w-full bg-green-500 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-green-600 active:bg-green-700 text-lg">
                    ✨ このレシートを読み取る
                </button>
            </div>

            <div id="result-area" class="hidden bg-white rounded-xl shadow-md overflow-hidden mb-6 border border-green-200">
                <div class="bg-green-500 text-white px-4 py-2 font-bold flex justify-between items-center">
                    <span>読み取り完了</span>
                    <button id="copy-btn" class="bg-white text-green-600 text-xs px-2 py-1 rounded shadow">コピー</button>
                </div>
                <div class="p-4">
                    <textarea id="result-text" class="w-full h-40 border-none resize-none focus:ring-0 text-gray-700" readonly></textarea>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 border-b pb-2 gap-2">
                <h2 class="text-xl font-bold text-gray-700 whitespace-nowrap">過去の履歴</h2>
                <div class="relative w-full max-w-[200px]">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-500">🔍</span>
                    <input type="text" id="search-input" placeholder="テキスト検索..." class="w-full border border-gray-300 pl-7 pr-2 py-1.5 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div id="history-list" class="space-y-4">
                </div>
        </section>

        <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-white font-bold text-lg">処理中...</p>
        </div>
    </main>

    <div id="image-modal" class="hidden fixed inset-0 bg-black bg-opacity-95 z-50 flex items-center justify-center touch-none">
        <button id="close-image-modal" class="absolute top-4 right-4 text-white text-4xl font-bold z-50 p-2 leading-none">&times;</button>
        <img id="modal-image" src="" alt="拡大画像" class="max-w-full max-h-full transition-transform duration-75 origin-center object-contain">
        <p class="absolute bottom-6 text-white text-sm opacity-75 pointer-events-none bg-black bg-opacity-50 px-3 py-1 rounded-full">2本指でピンチして拡大/縮小</p>
    </div>

    <div id="text-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-lg p-4 flex flex-col h-[70vh] shadow-2xl relative">
            <div class="flex justify-between items-center mb-1">
                <h3 class="font-bold text-gray-700">テキストの確認・編集</h3>
                <button id="close-text-modal" class="text-gray-500 text-3xl font-bold p-1 leading-none hover:text-gray-800">&times;</button>
            </div>
            <p class="text-[11px] text-gray-500 mb-2 border-b pb-2">エリア内を2本指でピンチして文字サイズを変更できます</p>
            
            <textarea id="modal-textarea" class="w-full flex-grow border border-gray-300 rounded p-3 text-base resize-none focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 font-mono"></textarea>
            
            <div class="mt-4 flex justify-end gap-3">
                <button id="cancel-text-btn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold hover:bg-gray-300 transition">キャンセル</button>
                <button id="save-text-btn" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 shadow transition">保存して閉じる</button>
            </div>
        </div>
    </div>

    <script>
        // --- 状態管理変数 ---
        let apiKey = '';
        let currentImageBase64 = '';
        let historyData = [];

        // DOM要素の取得
        const setupArea = document.getElementById('setup-area');
        const mainArea = document.getElementById('main-area');
        const errorMsg = document.getElementById('error-msg');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        
        const apiKeyInput = document.getElementById('api-key-input');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const cancelSettingsBtn = document.getElementById('cancel-settings-btn');
        const navSettingsBtn = document.getElementById('nav-settings-btn');

        const imageInput = document.getElementById('image-input');
        const cameraBtn = document.getElementById('camera-btn');
        const fileBtn = document.getElementById('file-btn');
        const previewArea = document.getElementById('preview-area');
        const previewImg = document.getElementById('preview-img');
        const scanBtn = document.getElementById('scan-btn');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');
        const historyList = document.getElementById('history-list');
        const searchInput = document.getElementById('search-input');

        // モーダル要素の取得
        const imageModal = document.getElementById('image-modal');
        const modalImage = document.getElementById('modal-image');
        const closeImageModalBtn = document.getElementById('close-image-modal');
        
        const textModal = document.getElementById('text-modal');
        const modalTextarea = document.getElementById('modal-textarea');
        const closeTextModalBtn = document.getElementById('close-text-modal');
        const cancelTextBtn = document.getElementById('cancel-text-btn');
        const saveTextBtn = document.getElementById('save-text-btn');

        // --- 初期化処理 ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                localforage.config({
                    name: 'ReceiptScannerApp',
                    storeName: 'scanner_data'
                });

                apiKey = await localforage.getItem('visionApiKey');
                if (apiKey) {
                    apiKeyInput.placeholder = '【＊＊＊＊＊＊】変更する場合のみ入力';
                    apiKeyInput.value = ''; 
                    showMainArea();
                } else {
                    showSetupArea();
                }

                const savedHistory = await localforage.getItem('receiptHistory');
                if (savedHistory && Array.isArray(savedHistory)) {
                    historyData = savedHistory;
                    renderHistory();
                }
            } catch (err) {
                showError("データの読み込みに失敗しました。シークレットモードでは正常に動作しない場合があります。");
            }
        });

        // --- UI表示切り替え関数 ---
        function showSetupArea() {
            setupArea.classList.remove('hidden');
            mainArea.classList.add('hidden');
            if (apiKey) {
                cancelSettingsBtn.classList.remove('hidden');
            } else {
                cancelSettingsBtn.classList.add('hidden');
            }
        }

        function showMainArea() {
            setupArea.classList.add('hidden');
            mainArea.classList.remove('hidden');
            errorMsg.classList.add('hidden');
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => errorMsg.classList.add('hidden'), 5000);
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loadingOverlay.classList.remove('hidden');
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        // --- 設定画面のイベント ---
        navSettingsBtn.addEventListener('click', () => {
            apiKeyInput.value = ''; 
            showSetupArea();
        });
        
        cancelSettingsBtn.addEventListener('click', () => {
            apiKeyInput.value = ''; 
            showMainArea();
        });

        saveKeyBtn.addEventListener('click', async () => {
            const val = apiKeyInput.value.trim();
            if (!val && apiKey) {
                showMainArea();
                return;
            }
            if (!val) {
                showError("APIキーを入力してください。");
                return;
            }
            try {
                await localforage.setItem('visionApiKey', val);
                apiKey = val;
                apiKeyInput.placeholder = '【＊＊＊＊＊＊】変更する場合のみ入力';
                apiKeyInput.value = ''; 
                showMainArea();
            } catch (err) {
                showError("APIキーの保存に失敗しました。");
            }
        });

        // --- カメラ・画像選択のイベント ---
        cameraBtn.addEventListener('click', () => {
            imageInput.setAttribute('capture', 'environment');
            imageInput.click();
        });

        fileBtn.addEventListener('click', () => {
            imageInput.removeAttribute('capture');
            imageInput.click();
        });

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showLoading('画像を処理中...');
            resultArea.classList.add('hidden');
            
            try {
                currentImageBase64 = await compressImage(file, 1200);
                previewImg.src = currentImageBase64;
                previewArea.classList.remove('hidden');
                imageInput.value = '';
            } catch (err) {
                showError("画像の処理に失敗しました。");
            } finally {
                hideLoading();
            }
        });

        function compressImage(file, maxSize) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxSize) { height *= maxSize / width; width = maxSize; }
                        } else {
                            if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.onerror = reject;
                    img.src = event.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // --- Google Vision API 呼び出し処理 ---
        scanBtn.addEventListener('click', async () => {
            if (!currentImageBase64) return;
            if (!apiKey) {
                showError("APIキーが設定されていません。");
                showSetupArea();
                return;
            }

            showLoading('クラウドで文字を解析中...');
            
            try {
                const base64Data = currentImageBase64.split(',')[1];
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requests: [{
                            image: { content: base64Data },
                            features: [{ type: 'DOCUMENT_TEXT_DETECTION' }],
                            imageContext: { languageHints: ['ja', 'en'] }
                        }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "API通信エラーが発生しました");

                const text = data.responses[0]?.fullTextAnnotation?.text || "文字が検出されませんでした。";
                
                resultText.value = text;
                resultArea.classList.remove('hidden');
                previewArea.classList.add('hidden');

                await saveToHistory(currentImageBase64, text);
            } catch (err) {
                showError("読み取り失敗: " + err.message);
                if (err.message.includes('API_KEY_INVALID')) showSetupArea();
            } finally {
                hideLoading();
            }
        });

        // --- 履歴の保存と表示（検索含む） ---
        async function saveToHistory(imgBase64, text) {
            const newItem = {
                id: Date.now().toString(),
                date: new Date().toLocaleString('ja-JP'),
                image: imgBase64,
                text: text
            };
            historyData.unshift(newItem);
            if (historyData.length > 30) historyData = historyData.slice(0, 30);
            
            try {
                await localforage.setItem('receiptHistory', historyData);
                renderHistory();
            } catch (err) {
                console.error("履歴の保存に失敗", err);
            }
        }

        searchInput.addEventListener('input', renderHistory);

        function renderHistory() {
            historyList.innerHTML = '';
            const searchTerm = searchInput.value.toLowerCase();
            
            const filteredData = historyData.filter(item => {
                return item.text.toLowerCase().includes(searchTerm);
            });

            if (filteredData.length === 0) {
                historyList.innerHTML = '<p class="text-gray-500 text-center py-6">該当する履歴がありません。</p>';
                return;
            }

            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden";
                
                card.innerHTML = `
                    <div class="bg-gray-50 px-4 py-2 text-xs text-gray-500 border-b flex justify-between items-center">
                        <span>🕒 ${item.date}</span>
                        <button onclick="deleteHistory('${item.id}')" class="text-red-500 hover:text-red-700 font-bold">削除</button>
                    </div>
                    <div class="grid grid-cols-5 h-48">
                        <div class="col-span-2 border-r bg-gray-100 flex items-center justify-center p-2 overflow-hidden cursor-pointer active:bg-gray-200 transition relative" id="img-container-${item.id}">
                            <img src="${item.image}" alt="receipt" class="history-img rounded pointer-events-none">
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 bg-black bg-opacity-10 transition pointer-events-none">
                                <span class="text-white text-3xl drop-shadow-md">🔍</span>
                            </div>
                        </div>
                        <div class="col-span-3 p-3 overflow-y-auto cursor-pointer active:bg-gray-50 transition relative" id="text-container-${item.id}">
                            <p class="whitespace-pre-wrap text-sm text-gray-700 font-mono pointer-events-none">${escapeHtml(item.text)}</p>
                        </div>
                    </div>
                    <div class="bg-gray-100 text-[11px] text-gray-500 text-center py-1 border-t tracking-wider">
                        画像またはテキストを長押しで拡大・編集できます
                    </div>
                `;
                historyList.appendChild(card);

                const imgContainer = document.getElementById(`img-container-${item.id}`);
                const textContainer = document.getElementById(`text-container-${item.id}`);

                addLongPressListener(imgContainer, () => openImageModal(item.image));
                addLongPressListener(textContainer, () => openTextModal(item.id, item.text));
            });
        }

        window.deleteHistory = async function(id) {
            if(confirm("この履歴を削除してもよろしいですか？")) {
                historyData = historyData.filter(item => item.id !== id);
                await localforage.setItem('receiptHistory', historyData);
                renderHistory();
            }
        };

        // --- 長押し判定とピンチズーム処理 ---
        function addLongPressListener(element, callback) {
            let pressTimer;
            let startX, startY;

            const start = (e) => {
                if (e.type === 'mousedown' && e.button !== 0) return;
                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                }
                pressTimer = setTimeout(() => { callback(e); }, 450); // 450msで長押し判定
            };

            const move = (e) => {
                if (e.type === 'touchmove') {
                    const dx = e.touches[0].clientX - startX;
                    const dy = e.touches[0].clientY - startY;
                    // 少しでもスクロールしたら長押しキャンセル
                    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) clearTimeout(pressTimer);
                }
            };

            const cancel = () => clearTimeout(pressTimer);

            element.addEventListener('mousedown', start);
            element.addEventListener('touchstart', start, { passive: true });
            
            element.addEventListener('mousemove', cancel);
            element.addEventListener('touchmove', move, { passive: true });
            
            element.addEventListener('mouseup', cancel);
            element.addEventListener('mouseleave', cancel);
            element.addEventListener('touchend', cancel);
            element.addEventListener('touchcancel', cancel);
            
            element.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        function getDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // --- 画像拡大モーダルの制御 ---
        let imgCurrentScale = 1;
        let imgStartScale = 1;
        let initialDistance = 0;

        function openImageModal(imgSrc) {
            modalImage.src = imgSrc;
            imgCurrentScale = 1;
            modalImage.style.transform = `scale(1)`;
            imageModal.classList.remove('hidden');
        }

        closeImageModalBtn.addEventListener('click', () => {
            imageModal.classList.add('hidden');
        });

        modalImage.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = getDistance(e.touches);
                imgStartScale = imgCurrentScale;
            }
        }, { passive: false });

        modalImage.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault(); 
                const currentDistance = getDistance(e.touches);
                imgCurrentScale = imgStartScale * (currentDistance / initialDistance);
                imgCurrentScale = Math.min(Math.max(1, imgCurrentScale), 5); // 1倍〜5倍に制限
                modalImage.style.transform = `scale(${imgCurrentScale})`;
            }
        }, { passive: false });

        // --- テキスト編集・拡大モーダルの制御 ---
        let editingHistoryId = null;
        let textCurrentScale = 1;
        let textStartScale = 1;
        let textInitialDistance = 0;
        const baseFontSize = 16; 

        function openTextModal(id, text) {
            editingHistoryId = id;
            modalTextarea.value = text;
            textCurrentScale = 1;
            modalTextarea.style.fontSize = `${baseFontSize}px`;
            
            // 行間をフォントサイズに対して常に1.5倍に設定（重なり防止）
            modalTextarea.style.lineHeight = '1.5'; 
            
            textModal.classList.remove('hidden');
        }

        function closeTextModal() {
            textModal.classList.add('hidden');
            editingHistoryId = null;
        }

        closeTextModalBtn.addEventListener('click', closeTextModal);
        cancelTextBtn.addEventListener('click', closeTextModal);

        saveTextBtn.addEventListener('click', async () => {
            if (editingHistoryId) {
                const newText = modalTextarea.value;
                const itemIndex = historyData.findIndex(item => item.id === editingHistoryId);
                if (itemIndex !== -1) {
                    historyData[itemIndex].text = newText;
                    await localforage.setItem('receiptHistory', historyData);
                    renderHistory(); 
                }
            }
            closeTextModal();
        });

        modalTextarea.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                textInitialDistance = getDistance(e.touches);
                textStartScale = textCurrentScale;
            }
        }, { passive: false });

        modalTextarea.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault(); // ピンチズーム中の意図しないスクロールを防ぐ
                const currentDistance = getDistance(e.touches);
                textCurrentScale = textStartScale * (currentDistance / textInitialDistance);
                textCurrentScale = Math.min(Math.max(0.8, textCurrentScale), 3.5); // 0.8倍〜3.5倍
                modalTextarea.style.fontSize = `${baseFontSize * textCurrentScale}px`;
            }
        }, { passive: false });


        // --- ユーティリティ ---
        document.getElementById('copy-btn').addEventListener('click', () => {
            resultText.select();
            document.execCommand('copy');
            const btn = document.getElementById('copy-btn');
            const originalText = btn.textContent;
            btn.textContent = 'コピーしました！';
            setTimeout(() => btn.textContent = originalText, 2000);
        });

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
